name: Auto Merge PRs

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Resolve conflicts automatically
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git merge origin/main -X ours --no-edit
          git push
        continue-on-error: true

      - name: Mark PR as ready (undraft)
        run:
          gh pr ready ${{ github.event.pull_request.number }} --repo ${{
          github.repository }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Approve PR
        run:
          gh pr review ${{ github.event.pull_request.number }} --approve --repo
          ${{ github.repository }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Merge PR
        id: merge
        run:
          gh pr merge ${{ github.event.pull_request.number }} --merge --repo ${{
          github.repository }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger site deploy
        if: steps.merge.outcome == 'success'
        run: |
          gh workflow run deploy.yml --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Next session is handled by heartbeat.yml (runs every 15 min)
